# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "979f73a62b77eeb04b930656a85bc7c6"
name = "Strimix"
application_url = "https://example.com"
embedded = true

[build]
automatically_update_urls_on_dev = true

[webhooks]
api_version = "2026-04"

  [[webhooks.subscriptions]]
  topics = [ "app/uninstalled" ]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = [ "app/scopes_update" ]
  uri = "/webhooks/app/scopes_update"

  [[webhooks.subscriptions]]
  topics = [ "orders/create" ]
  uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  topics = [ "orders/updated" ]
  uri = "/webhooks/orders/updated"

  [[webhooks.subscriptions]]
  topics = [ "refunds/create" ]
  uri = "/webhooks/refunds/create"

  # Mandatory GDPR webhooks — use compliance_topics, not topics (see Shopify docs).
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers-data-request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers-redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop-redact"
  compliance_topics = [ "shop/redact" ]

[access_scopes]
# read_orders: webhooks; read_products: Admin GraphQL order lines
# write_pixels + read_customer_events: required for app Web Pixel (Customer events)
scopes = "read_orders,read_products,read_customers,write_customers,write_pixels,read_customer_events,write_app_proxy"

[app_proxy]
url = "/apps/strimix"
prefix = "apps"
subpath = "strimix"

[auth]
redirect_urls = [ "https://example.com/api/auth" ]
